# https://docs.npmjs.com/trusted-publishers#step-2-configure-your-cicd-workflow

name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  check_version:
    name: Check Version
    runs-on: ubuntu-latest
    if: github.repository == 'vahor/typed-es'
    outputs:
      should_release: ${{ steps.version_check.outputs.should_release }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check if version changed
        id: version_check
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "Latest tag: $LATEST_TAG"
          echo "Package version: $PACKAGE_VERSION"
          if [ "$LATEST_TAG" = "v$PACKAGE_VERSION" ]; then
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

  release:
    name: Release
    needs: check_version
    if: github.repository == 'vahor/typed-es' && needs.check_version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write # to create release (changesets/action)
      id-token: write # OpenID Connect token needed for provenance
      pull-requests: write # to create pull request (changesets/action)
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup npmrc
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > .npmrc

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1.6.0
        with:
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
          publish: bun run ci:publish
          version: bun run ci:version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_ENV: production
          NPM_CONFIG_PROVENANCE: true
          HUSKY: 0
